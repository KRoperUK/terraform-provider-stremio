name: release-please

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        steps:
            - name: Run release-please
              id: release
              uses: googleapis/release-please-action@v4
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
                  skip-github-release: true

    create-tag-from-release-commit:
        needs: release-please
        runs-on: ubuntu-latest
        outputs:
            created: ${{ steps.tag.outputs.created }}
            tag: ${{ steps.tag.outputs.tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Create tag from release commit
              id: tag
              run: |
                  set -euo pipefail

                  SUBJECT="$(git log -1 --pretty=%s)"
                                    VERSION="$(printf '%s' "${SUBJECT}" | sed -nE 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+)( \(#[0-9]+\))?$/\1/p')"
                                    if [ -z "${VERSION}" ]; then
                    echo "Latest commit is not a release commit: ${SUBJECT}"
                    echo "created=false" >> "$GITHUB_OUTPUT"
                    echo "tag=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                                    TAG="v${VERSION}"
                  echo "Detected release tag: ${TAG}"

                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
                    echo "Tag ${TAG} already exists on origin."
                    echo "created=false" >> "$GITHUB_OUTPUT"
                    echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  git tag "${TAG}" "${GITHUB_SHA}"
                  git push origin "${TAG}"

                  echo "created=true" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
