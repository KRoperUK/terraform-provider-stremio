name: release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        steps:
            - name: Run release-please
              uses: googleapis/release-please-action@v4
              id: release
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  skip-github-release: true

    prepare-tag:
        needs: release-please
        runs-on: ubuntu-latest
        outputs:
            should_release: ${{ steps.prepare.outputs.should_release }}
            tag_name: ${{ steps.prepare.outputs.tag_name }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Determine release tag
              id: prepare
              run: |
                  set -euo pipefail

                  if ! git show --name-only --pretty="" HEAD | grep -qx ".release-please-manifest.json"; then
                      echo "No release-please manifest update in this push; skipping release."
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  VERSION="$(jq -r '.["."]' .release-please-manifest.json)"
                  if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
                      echo "Unable to determine version from manifest."
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  TAG_NAME="v${VERSION}"

                  if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
                      echo "Tag ${TAG_NAME} already exists; skipping release."
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}" "${GITHUB_SHA}"
                  git push origin "${TAG_NAME}"

                  echo "should_release=true" >> "$GITHUB_OUTPUT"
                  echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

            - name: Update release PR labels
              if: steps.prepare.outputs.should_release == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail

                  PR_NUMBER="$(gh api -H 'Accept: application/vnd.github+json' "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[] | select(.merged_at != null) | .number' | head -n1 || true)"

                  if [ -z "${PR_NUMBER}" ]; then
                      echo "No merged PR associated with commit ${GITHUB_SHA}; skipping label update."
                      exit 0
                  fi

                  gh pr edit "${PR_NUMBER}" --remove-label "autorelease: pending" || true
                  gh pr edit "${PR_NUMBER}" --add-label "autorelease: tagged" || true

    goreleaser:
        needs: prepare-tag
        if: needs.prepare-tag.outputs.should_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: refs/tags/${{ needs.prepare-tag.outputs.tag_name }}

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Import GPG key
              id: import_gpg
              uses: crazy-max/ghaction-import-gpg@v6
              with:
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.GPG_PASSPHRASE }}

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v6
              with:
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
