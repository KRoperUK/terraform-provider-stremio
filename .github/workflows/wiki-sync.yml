name: wiki-sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync docs/wiki to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ ! -d "docs/wiki" ]; then
            echo "docs/wiki not found. Nothing to sync."
            exit 0
          fi

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git" wiki

          rsync -av --delete --exclude='.git/' docs/wiki/ wiki/

          git -C wiki config user.name "github-actions[bot]"
          git -C wiki config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -C wiki add .

          if git -C wiki diff --cached --quiet; then
            echo "No wiki changes to commit."
            exit 0
          fi

          git -C wiki commit -m "docs(wiki): sync from ${COMMIT_SHA}"

          WIKI_BRANCH="$(git -C wiki symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@')"
          if [ -z "${WIKI_BRANCH}" ]; then
            if git -C wiki show-ref --verify --quiet refs/remotes/origin/main; then
              WIKI_BRANCH="main"
            else
              WIKI_BRANCH="master"
            fi
          fi
          echo "Pushing wiki changes to branch: ${WIKI_BRANCH}"
          git -C wiki push origin "HEAD:${WIKI_BRANCH}"
