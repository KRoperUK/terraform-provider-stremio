version: 2
updates:
    # Go module dependencies (terraform-plugin-framework, etc.)
    - package-ecosystem: gomod
      directory: "/"
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 10
      commit-message:
          prefix: "deps"
          prefix-development: "deps-dev"
      groups:
          go-dependencies:
              patterns:
                  - "*"

    # GitHub Actions used in workflows
    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 10
      commit-message:
          prefix: "ci"
      groups:
          github-actions:
              patterns:
                  - "*"
